name: Sync IPTV Index

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest index.m3u
        run: curl -fsSL "https://iptv-org.github.io/iptv/index.m3u" -o index.m3u

      - name: Detect playlist changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain -- index.m3u)" ]; then
            echo "No changes to index.m3u"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated playlist
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.m3u
          git commit -m "chore: sync IPTV index.m3u"
          git push

      - name: Trigger deployment workflow
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref "${{ github.ref_name }}"
